name: CSV パーサー追加リクエスト
description: 未対応の銀行・カード・電子マネーの CSV 対応を依頼する
labels: ['parser']
body:
  - type: markdown
    attributes:
      value: |
        対応してほしい明細フォーマットを教えてください。
        ご自身で書ける方は [CONTRIBUTING.md](../../CONTRIBUTING.md) を参照して PR を歓迎します。
        **金額・氏名・口座番号などは必ず匿名化してください**（匿名化の指針は CONTRIBUTING.md）。
  - type: input
    id: name
    attributes:
      label: 銀行 / カード / 電子マネー名
      placeholder: '○○銀行 / ○○カード'
    validations:
      required: true
  - type: textarea
    id: header
    attributes:
      label: CSV のヘッダー行
      description: 1 行目（列名の行）をそのまま貼ってください
      render: text
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: 匿名化したサンプル数行
      description: 入金 1 件 + 出金 2 件程度。金額・取引先は虚構の値に置き換えること
      render: text
    validations:
      required: true
  - type: dropdown
    id: encoding
    attributes:
      label: 文字コード
      options:
        - UTF-8
        - Shift_JIS
        - 不明
    validations:
      required: true
  - type: dropdown
    id: self
    attributes:
      label: 自分で実装する意思
      options:
        - 自分で PR を出す予定
        - フォーマット情報の提供のみ
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 確認
      options:
        - label: 貼り付けた CSV は匿名化済みで、実際の個人情報を含みません
          required: true
