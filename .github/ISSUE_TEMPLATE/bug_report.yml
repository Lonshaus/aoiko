name: バグ報告
description: 動作の不具合・想定と違う挙動を報告する
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        報告ありがとうございます。
        **API キー・実際の金額・氏名・口座番号などの個人情報は貼らないでください。**
        aoiko はバックエンドを持たず、データはすべて端末内に保存されます（[PRIVACY.md](../../PRIVACY.md)）。
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きたかを一言で
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      placeholder: |
        1. /import を開く
        2. ○○銀行の CSV を選ぶ
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待した挙動 / 実際の挙動
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 該当する機能
      options:
        - 仕訳入力
        - CSV 取込
        - 領収書 OCR
        - 注文取込
        - 帳票
        - 消費税
        - 減価償却
        - 前期繰越
        - .xtx 出力
        - バックアップ / 復元
        - 修正申告
        - その他 / 不明
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 環境
      description: ブラウザ・バージョン・OS
      placeholder: 'Chrome 124 / macOS 15'
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 確認
      options:
        - label: API キーや個人情報を本文・添付に含めていません
          required: true
