version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # TypeScript 7（ネイティブ実装）は svelte-check 非対応のため major を止める（language-tools 対応後に解除）
      - dependency-name: typescript
        update-types: ['version-update:semver-major']
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
